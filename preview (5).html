<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zone Out</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Courier New", monospace;
}

body {
    overflow: hidden;
    background: black;
    color: white;
}

/* 🎥 VIDEO */
video {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: translate(-50%, -50%);
    z-index: -3;
}

/* 🌑 OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at left, rgba(80,0,120,0.4), rgba(0,0,0,0.9));
    z-index: -2;
}

/* 📺 SCANLINES */
.scanlines {
    pointer-events: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 2px,
        transparent 4px
    );
    z-index: 5;
}

/* 📺 VIGNETTE */
.vignette {
    pointer-events: none;
    position: fixed;
    width: 100%;
    height: 100%;
    box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
    z-index: 6;
}

/* ⚡ FLICKER */
@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.97; }
    100% { opacity: 1; }
}
body { animation: flicker 0.12s infinite; }

/* 📼 VHS TEARING */
.glitch {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: transparent;
    z-index: 7;
}

.glitch.active {
    animation: tear 0.15s linear;
}

@keyframes tear {
    0% { transform: translate(0,0); }
    20% { transform: translate(-5px,2px); }
    40% { transform: translate(5px,-2px); }
    60% { transform: translate(-3px,1px); }
    80% { transform: translate(3px,-1px); }
    100% { transform: translate(0,0); }
}

/* MENU */
.menu {
    position: absolute;
    top: 20%;
    left: 6%;
}

.title {
    font-size: 64px;
    margin-bottom: 40px;
}

.option {
    font-size: 28px;
    margin: 10px 0;
    cursor: pointer;
    opacity: 0.7;
}

.option.active {
    opacity: 1;
}

.selector::before {
    content: ">> ";
}

.footer {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
    opacity: 0.6;
}

/* 🔲 LOADING SCREEN */
.loadingScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
}

.loadingScreen.active {
    opacity: 1;
    pointer-events: all;
}

/* FLOATING IMAGE */
.loadingScreen img {
    width: 120px;
    animation: float 2s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* LOADING TEXT */
.loadingText {
    margin-top: 20px;
    font-size: 24px;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="stalkorpheus.mp4" type="video/mp4">
</video>

<audio autoplay loop id="bgAudio">
    <source src="distorted.ogg" type="audio/ogg">
</audio>

<div class="overlay"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="glitch" id="glitch"></div>

<div class="menu">
    <div class="title">Zone Out</div>

    <div class="option" id="rsvp">RSVP</div>
    <div class="option active selector">Learn More</div>
</div>

<div class="footer">A HackClub YSWS event</div>

<!-- LOADING SCREEN -->
<div class="loadingScreen" id="loadingScreen">
    <img src="hp.png">
    <div class="loadingText" id="loadingText">Loading</div>
</div>

<script>
const options = document.querySelectorAll(".option");
let index = 1;

function updateSelection() {
    options.forEach(opt => opt.classList.remove("active", "selector"));
    options[index].classList.add("active", "selector");
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") {
        index = (index + 1) % options.length;
        updateSelection();
    }
    if (e.key === "ArrowUp") {
        index = (index - 1 + options.length) % options.length;
        updateSelection();
    }
    if (e.key === "Enter") {
        if (index === 0) startLoading();
    }
});

options.forEach((opt, i) => {
    opt.addEventListener("mouseenter", () => {
        index = i;
        updateSelection();
    });
});

/* 🎯 RSVP CLICK */
document.getElementById("rsvp").addEventListener("click", startLoading);

function startLoading() {
    const screen = document.getElementById("loadingScreen");
    screen.classList.add("active");

    let dots = 0;
    const text = document.getElementById("loadingText");

    const dotInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        text.innerText = "Loading" + ".".repeat(dots);
    }, 400);

    const delay = Math.random() * 5000 + 3000;

    setTimeout(() => {
        clearInterval(dotInterval);
        window.location.href = "https://forms.fillout.com/t/fuxhBdNbhdus";
    }, delay);
}

/* 📼 RANDOM VHS GLITCH */
const glitch = document.getElementById("glitch");

setInterval(() => {
    if (Math.random() < 0.3) {
        glitch.classList.add("active");
        setTimeout(() => glitch.classList.remove("active"), 150);
    }
}, 1200);

/* 🔊 FORCE AUDIO */
const audio = document.getElementById("bgAudio");
function tryPlay() {
    audio.play().catch(() => {});
}
window.addEventListener("load", tryPlay);
document.addEventListener("click", tryPlay);
document.addEventListener("keydown", tryPlay);

updateSelection();
</script>

</body>
</html>
